services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: always
    networks:
      - app_network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: quest_user
      POSTGRES_PASSWORD: quest_pass
      POSTGRES_DB: quest_db
    ports:
      - "5432:5432"
    volumes:
      - quest_postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app_network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: always
    networks:
      - app_network

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - app_network

  grafana:
    image: grafana/grafana-oss:10.4.3
    container_name: quest_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: always
    networks:
      - app_network

  node-exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"
    restart: always
    networks:
      - app_network

  jenkins:
    image: jenkins/jenkins:lts
    container_name: quest_jenkins
    ports:
      - "8081:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /home/sayat/QuestPlanner:/project
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - app_network

  ai_bot:
    build: ./ai_bot
    container_name: quest_ai_bot
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
    depends_on:
      - backend
    restart: always
    networks:
      - app_network

volumes:
  quest_postgres_data:
  grafana_data:
  jenkins_data:

networks:
  app_network:
